# ============================================================================
#  Full-Stack Docker Compose (Practice / Learning)
# ============================================================================
#
#  This file runs the ENTIRE Task Manager stack — main app + all 8
#  microservices + databases + search engine + object storage.
#
#  Compare this to the production docker-compose.yml (in task-manager/)
#  which only runs 2 services (app + db).
#
#  This is how Docker Compose replaces what Kubernetes does — but on
#  a single machine without auto-scaling, self-healing, or rolling updates.
#
#  ── How to use ──────────────────────────────────────────────────────────
#
#  1. Build all Docker images first (from task-manager/ directory):
#
#       cd task-manager
#       docker build -t task-manager-app:latest .
#       docker build -t notification-service:latest -f services/notification/Dockerfile .
#       docker build -t scheduler-service:latest -f services/scheduler/Dockerfile .
#       docker build -t realtime-service:latest -f services/realtime/Dockerfile .
#       docker build -t webhook-service:latest -f services/webhook/Dockerfile .
#       docker build -t file-service:latest -f services/file-service/Dockerfile .
#       docker build -t search-sync-service:latest -f services/search-sync/Dockerfile .
#       docker build -t analytics-service:latest -f services/analytics/Dockerfile .
#       docker build -t team-service:latest -f services/team-service/Dockerfile .
#
#  2. Run everything (from this directory):
#
#       docker compose -f docker-compose-fullstack.yml up -d
#
#  3. Push the database schema:
#
#       set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/taskmanager
#       cd ../../task-manager && npx prisma db push
#
#  4. Open http://localhost:3000
#
#  5. Clean up:
#
#       docker compose -f docker-compose-fullstack.yml down
#       docker compose -f docker-compose-fullstack.yml down -v   # delete data
#
#  ── Service Map ─────────────────────────────────────────────────────────
#
#  Service           Port  Purpose
#  ────────────────  ────  ─────────────────────────────────────
#  app               3000  Main Next.js application (frontend + API)
#  db                5432  PostgreSQL database
#  notification      3004  Email + in-app notifications (internal only)
#  realtime          3001  WebSocket gateway for live updates
#  webhook           3003  Webhook delivery with retry (internal only)
#  file-service      3005  File upload/download (internal only)
#  minio             9000  S3-compatible object storage (internal only)
#  search-sync       3006  Syncs tasks to Meilisearch (internal only)
#  meilisearch       7700  Full-text search engine (internal only)
#  analytics         8000  Python FastAPI analytics (internal only)
#  team-service      3002  Team & workspace management (internal only)
#  scheduler         N/A   CronJob — run manually (see bottom)
#
#  Ports exposed to host (accessible from browser):
#    3000 (app), 5432 (db), 9001 (MinIO console), 7700 (Meilisearch)
#
# ============================================================================

# ── Services ──────────────────────────────────────────────────────────────

services:

  # ═══════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE: Database, Storage, Search Engine
  # These start first — everything else depends on them.
  # ═══════════════════════════════════════════════════════════════════════

  # ── PostgreSQL ──────────────────────────────────────────────────────
  # The central database. ALL services connect to this (except realtime).
  # Uses a named volume so data survives container deletion.
  db:
    image: postgres:17-alpine
    container_name: tm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────
  # S3-compatible object storage for file attachments.
  # The file-service uploads files here.
  # Port 9000 = S3 API, Port 9001 = Web console.
  minio:
    image: minio/minio:latest
    container_name: tm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"                          # Web UI at http://localhost:9001
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Meilisearch ─────────────────────────────────────────────────────
  # Full-text search engine. The search-sync service indexes tasks here.
  # The main app queries it directly via /api/tasks/search.
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: tm-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: meili-master-key-change-me
    ports:
      - "7700:7700"                          # Web UI at http://localhost:7700
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════
  # MICROSERVICES: Backend services that the main app calls
  # These depend on the infrastructure above being healthy.
  # ═══════════════════════════════════════════════════════════════════════

  # ── Notification Service ────────────────────────────────────────────
  # Sends email + creates in-app notifications for due-soon/completed tasks.
  # If SMTP_HOST is empty, emails are skipped but in-app notifications work.
  notification:
    image: notification-service:latest       # Pre-built image
    container_name: tm-notification
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager
      SMTP_HOST: ""                           # Empty = skip email, in-app only
      SMTP_PORT: "587"
      SMTP_FROM: "noreply@taskmanager.local"
      # SMTP_USER / SMTP_PASSWORD omitted (empty host = no SMTP)
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    # No ports exposed — internal only (main app calls it via Docker DNS)

  # ── Realtime Service ────────────────────────────────────────────────
  # WebSocket gateway for live task board updates.
  # Does NOT need a database — it's a pure relay.
  # Needs NEXTAUTH_SECRET to decrypt JWT tokens from the main app.
  realtime:
    image: realtime-service:latest
    container_name: tm-realtime
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: local-dev-secret-change-in-production
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "3001:3001"                           # WebSocket connections
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Webhook Service ─────────────────────────────────────────────────
  # Delivers HTTP POST callbacks to user-registered URLs when tasks change.
  # Has a background worker that polls for pending deliveries + retries.
  webhook:
    image: webhook-service:latest
    container_name: tm-webhook
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager
      # Retry configuration (tunable without rebuilding image)
      MAX_ATTEMPTS: "5"
      BACKOFF_INTERVALS: "1,5,30,120,600"    # seconds between retries
      POLL_INTERVAL_MS: "2000"                # how often to check for pending
      DELIVERY_TIMEOUT_MS: "10000"            # per-delivery HTTP timeout
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── File Service ────────────────────────────────────────────────────
  # Handles file upload/download for task attachments.
  # Stores files in MinIO (S3-compatible).
  # Depends on MinIO being healthy (initContainer pattern in K8s).
  file-service:
    image: file-service:latest
    container_name: tm-file-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager
      MINIO_ENDPOINT: http://minio:9000       # Docker DNS resolves "minio"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Search Sync Service ─────────────────────────────────────────────
  # Syncs tasks from PostgreSQL to Meilisearch for full-text search.
  # The main app queries Meilisearch directly via /api/tasks/search.
  search-sync:
    image: search-sync-service:latest
    container_name: tm-search-sync
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager
      MEILI_URL: http://meilisearch:7700      # Docker DNS resolves "meilisearch"
      MEILI_MASTER_KEY: meili-master-key-change-me
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Analytics Service ───────────────────────────────────────────────
  # Python FastAPI service for productivity analytics.
  # Uses raw SQL (asyncpg), NOT Prisma — it's a polyglot service.
  # Strips pgbouncer params from DATABASE_URL (asyncpg doesn't support them).
  analytics:
    image: analytics-service:latest
    container_name: tm-analytics
    restart: unless-stopped
    environment:
      # asyncpg can't use ?pgbouncer=true — but our local DB has no pgbouncer
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager
      PYTHONUNBUFFERED: "1"                   # Flush logs immediately
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Team Service ────────────────────────────────────────────────────
  # Team & workspace management with RBAC (Admin/Member/Viewer).
  # The main app proxies requests here with an X-User-Id header.
  team-service:
    image: team-service:latest
    container_name: tm-team-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════
  # MAIN APP: Next.js frontend + API
  # Depends on ALL services being healthy.
  # ═══════════════════════════════════════════════════════════════════════

  app:
    image: task-manager-app:latest
    container_name: tm-app
    restart: unless-stopped
    environment:
      # ── Database ──
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskmanager

      # ── Auth ──
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-secret-change-in-production
      AUTH_TRUST_HOST: "true"

      # ── Microservice URLs ──
      # These use Docker DNS — "notification" resolves to the notification container
      REALTIME_URL: http://realtime:3001
      WEBHOOK_URL: http://webhook:3003
      FILE_SERVICE_URL: http://file-service:3005
      ANALYTICS_URL: http://analytics:8000
      TEAM_SERVICE_URL: http://team-service:3002

      # ── Meilisearch (queried directly by the app) ──
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: meili-master-key-change-me
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      notification:
        condition: service_healthy
      realtime:
        condition: service_healthy
      webhook:
        condition: service_healthy
      file-service:
        condition: service_healthy
      search-sync:
        condition: service_healthy
      analytics:
        condition: service_healthy
      team-service:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════
  # NOTE: Scheduler Service
  # ═══════════════════════════════════════════════════════════════════════
  #
  # The scheduler is a CRON JOB, not a long-running service.
  # It runs once, creates tasks from recurring templates, then exits.
  #
  # In Kubernetes, this is a CronJob resource that triggers every 5 minutes.
  # In Docker Compose, there's no native "cron" — you run it manually:
  #
  #   docker run --rm \
  #     --network study_default \
  #     -e DATABASE_URL="postgresql://postgres:postgres@db:5432/taskmanager" \
  #     scheduler-service:latest
  #
  # Or use a cron-based image like `supercronic` for automatic scheduling.
  #
  # ═══════════════════════════════════════════════════════════════════════

# ── Volumes ──────────────────────────────────────────────────────────────
# Named volumes persist data across container restarts.
# Docker manages where they're stored on the host filesystem.

volumes:
  pgdata:          # PostgreSQL data (users, tasks, teams, etc.)
  miniodata:       # MinIO/S3 data (uploaded file attachments)
  meilidata:       # Meilisearch index data (search documents)

# ============================================================================
#  What This File Demonstrates
# ============================================================================
#
#  1. DEPENDENCY CHAIN: app depends on services, services depend on db/storage
#     Docker Compose starts them in the right order automatically.
#
#  2. INTERNAL vs EXTERNAL: Only app (3000), db (5432), MinIO console (9001),
#     and Meilisearch (7700) have ports exposed to the host. Everything else
#     is internal-only — just like Kubernetes ClusterIP services.
#
#  3. SERVICE DISCOVERY: The app calls "http://realtime:3001" — Docker's
#     internal DNS resolves "realtime" to the realtime container's IP.
#     Same pattern as Kubernetes Service DNS.
#
#  4. HEALTH CHECKS: Every service has a healthcheck hitting /health.
#     Services with depends_on: condition: service_healthy wait for
#     their dependencies to pass health checks before starting.
#
#  5. ENVIRONMENT INJECTION: All config is via environment variables —
#     no secrets baked into images. Same pattern as Kubernetes Secrets/ConfigMaps.
#
#  COMPARISON TO KUBERNETES:
#
#  Docker Compose                     Kubernetes
#  ───────────────                    ──────────
#  services:                          kind: Deployment
#    image: ...                         image: ...
#  healthcheck:                       livenessProbe / readinessProbe
#    test: curl /health                 httpGet: /health
#  depends_on:                        initContainers
#    condition: service_healthy
#  volumes:                           PersistentVolumeClaim (PVC)
#    pgdata
#  ports:                             kind: Service + Ingress
#    "3000:3000"
#  restart: unless-stopped            Self-healing (automatic)
#
# ============================================================================
