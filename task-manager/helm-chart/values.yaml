replicaCount: 1

image:
  repository: ralf090102/task-manager-app
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: task-manager.local
      paths:
        - path: /
          pathType: Prefix

secrets:
  databaseUrl: ""
  nextauthSecret: ""
  nextauthUrl: "http://task-manager.local"
  authTrustHost: "true"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

scheduler:
  enabled: true
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  image:
    repository: ralf090102/scheduler-service
    pullPolicy: IfNotPresent
    tag: latest
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

notification:
  enabled: false
  image:
    repository: ralf090102/notification-service
    pullPolicy: IfNotPresent
    tag: latest
  smtp:
    host: ""
    port: "587"
    from: "noreply@taskmanager.local"
    user: ""
    password: ""
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

minio:
  enabled: false
  image:
    repository: minio/minio
    pullPolicy: IfNotPresent
    tag: latest
  persistence:
    size: 10Gi
  accessKey: "minioadmin"
  secretKey: "minioadmin"
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

fileService:
  enabled: false
  image:
    repository: ralf090102/file-service
    pullPolicy: IfNotPresent
    tag: latest
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

meilisearch:
  enabled: false
  image:
    repository: getmeili/meilisearch
    pullPolicy: IfNotPresent
    tag: v1.6
  persistence:
    size: 5Gi
  masterKey: "meili-master-key-change-me"
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

searchSync:
  enabled: false
  image:
    repository: ralf090102/search-sync-service
    pullPolicy: IfNotPresent
    tag: latest
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

realtime:
  enabled: false
  replicaCount: 1
  image:
    repository: ralf090102/realtime-service
    pullPolicy: IfNotPresent
    tag: latest
  corsOrigin: "http://task-manager.local"
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

analytics:
  enabled: false
  image:
    repository: ralf090102/analytics-service
    pullPolicy: IfNotPresent
    tag: latest
  cronSchedule: "0 9 * * 1"
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

monitoring:
  enabled: true
  serviceMonitor:
    scrapeInterval: 15s
    labels:
      release: monitoring
