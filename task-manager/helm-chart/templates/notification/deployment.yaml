{{- if .Values.notification.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-manager.fullname" . }}-notification
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "task-manager.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: notification
  template:
    metadata:
      labels:
        {{- include "task-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: notification
    spec:
      containers:
        - name: notification
          image: "{{ .Values.notification.image.repository }}:{{ .Values.notification.image.tag }}"
          imagePullPolicy: {{ .Values.notification.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3004
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-secrets
                  key: database-url
            - name: SMTP_HOST
              value: {{ .Values.notification.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.notification.smtp.port | quote }}
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-notification-secret
                  key: smtpUser
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-notification-secret
                  key: smtpPassword
            - name: SMTP_FROM
              value: {{ .Values.notification.smtp.from | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.notification.resources | nindent 12 }}
{{- end }}
