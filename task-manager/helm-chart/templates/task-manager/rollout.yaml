{{- if .Values.canary.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "task-manager.fullname" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "task-manager.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "task-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-secrets
                  key: database-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-secrets
                  key: nextauth-secret
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-secrets
                  key: nextauth-url
            - name: AUTH_TRUST_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-secrets
                  key: auth-trust-host
            {{- if .Values.meilisearch.enabled }}
            - name: MEILI_URL
              value: "http://{{ include "task-manager.fullname" . }}-meilisearch:7700"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.fullname" . }}-meilisearch-secret
                  key: masterKey
            {{- end }}
            {{- if .Values.realtime.enabled }}
            - name: REALTIME_URL
              value: "http://{{ include "task-manager.fullname" . }}-realtime:3001"
            {{- end }}
            {{- if .Values.analytics.enabled }}
            - name: ANALYTICS_URL
              value: "http://{{ include "task-manager.fullname" . }}-analytics:8000"
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: WEBHOOK_URL
              value: "http://{{ include "task-manager.fullname" . }}-webhook:3003"
            {{- end }}
            {{- if .Values.teamService.enabled }}
            - name: TEAM_SERVICE_URL
              value: "http://{{ include "task-manager.fullname" . }}-team-service:3002"
            {{- end }}
            {{- if .Values.fileService.enabled }}
            - name: FILE_SERVICE_URL
              value: "http://{{ include "task-manager.fullname" . }}-file-service:3005"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ include "task-manager.fullname" . }}-redis:6379"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  strategy:
    canary:
      canaryService: {{ include "task-manager.fullname" . }}-canary
      stableService: {{ include "task-manager.fullname" . }}
      trafficRouting:
        nginx:
          stableIngress: {{ include "task-manager.fullname" . }}
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: {{ include "task-manager.fullname" . }}-success-rate
        - setWeight: 50
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: {{ include "task-manager.fullname" . }}-success-rate
        - setWeight: 100
{{- end }}
