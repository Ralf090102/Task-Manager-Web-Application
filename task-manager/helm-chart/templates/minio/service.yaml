{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-manager.fullname" . }}-minio
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9000
      name: api
    - port: 9001
      name: console
  selector:
    {{- include "task-manager.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
