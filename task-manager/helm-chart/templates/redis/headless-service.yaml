{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-manager.fullname" . }}-redis-headless
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 6379
      name: redis
  selector:
    {{- include "task-manager.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
