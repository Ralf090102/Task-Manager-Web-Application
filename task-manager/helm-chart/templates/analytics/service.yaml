{{- if .Values.analytics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-manager.fullname" . }}-analytics
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: analytics
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "task-manager.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: analytics
{{- end }}
