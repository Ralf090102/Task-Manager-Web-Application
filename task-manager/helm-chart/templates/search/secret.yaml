{{- if .Values.meilisearch.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "task-manager.fullname" . }}-meilisearch-secret
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
type: Opaque
data:
  masterKey: {{ .Values.meilisearch.masterKey | b64enc | quote }}
{{- end }}
